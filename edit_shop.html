{% extends "layout.html" %}

{% block content %}

<h2>Edit Shop</h2>

<div class="card p-3">

    <form method="POST">

        <label>Shop Name</label>

        <input
            type="text"
            name="shop_name"
            class="form-control"
            value="{{ shop[1] }}"
            required
        >

        <br>

        <button
            type="submit"
            class="btn btn-primary">
            Update Shop
        </button>

        <a
            href="/shops"
            class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

{% endblock %}
