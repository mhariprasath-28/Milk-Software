{% extends "layout.html" %}

{% block content %}

<h2>Edit Product</h2>

<div class="card p-3">

    <form method="POST">

        <label>Product Name</label>
        <input
            type="text"
            name="product_name"
            class="form-control"
            value="{{ product[1] }}"
            required>

        <br>

        <label>Rate</label>
        <input
            type="number"
            name="rate"
            class="form-control"
            value="{{ product[2] }}"
            required>

        <br>

        <button type="submit" class="btn btn-primary">
            Update Product
        </button>

        <a href="/products" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
