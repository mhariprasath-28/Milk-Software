<!DOCTYPE html>

<html>
<head>
    <title>Milk Collection Software</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        margin:0;
        background:#f5f7fa;
    }

    .sidebar{
        width:250px;
        height:100vh;
        background:#0d6efd;
        position:fixed;
        left:0;
        top:0;
        padding-top:20px;
        overflow-y:auto;
    }

    .sidebar h3{
        text-align:center;
        margin-bottom:30px;
    }

    .sidebar a{
        display:block;
        color:white;
        text-decoration:none;
        padding:12px 20px;
        transition:0.3s;
    }

    .sidebar a:hover{
        background:#084298;
        color:white;
    }

    .sidebar a.active{
        background:#ffc107;
        color:#000;
        font-weight:bold;
        border-left:5px solid white;
    }

    .content{
        margin-left:260px;
        padding:20px;
    }

</style>
```

</head>

<body>

<div class="sidebar">

```
<h3 style="

   class="{% if request.path == '/' %}active{% endif %}">
