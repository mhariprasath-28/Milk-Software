{% extends "layout.html" %}

{% block content %}

<h2>Edit Entry</h2>

<div class="card p-3">

```
<form method="POST">

    <label>Date</label>
    <input
        type="date"
        name="entry_date"
        class="form-control"
        value="{{ rows[0][1] }}"
        required>

    <br>

    <label>Shop Name</label>
    <select name="shop_id" class="form-control">

        {% for shop in shops %}
        <option value="{{ shop[0] }}"
            {% if shop[0] == rows[0][2] %}
            selected
            {% endif %}>
            {{ shop[1] }}
        </option>
        {% endfor %}

    </select>

    <br>

    <div id="productRows">

        {% for row in rows %}

        <div class="row mb-3 product-row">

            <div class="col-md-4">

                <label>Product</label>

                <select name="product_id[]"
                        class="form-control product">

                    {% for product in products %}
                    <option value="{{ product[0] }}"
                            data-rate="{{ product[2] }}"
                            {% if product[0] == row[3] %}
                            selected
                            {% endif %}>
                        {{ product[1] }}
                    </option>
                    {% endfor %}

                </select>

            </div>

            <div class="col-md-2">

                <label>Liter</label>

                <input type="number"
                       step="0.01"
                       name="liter[]"
                       class="form-control liter"
                       value="{{ row[4] }}"
                       >

            </div>

            <div class="col-md-2">

                <label>Rate</label>

                <input type="number"
                       name="rate[]"
                       class="form-control rate"
                       value="{{ row[5] }}">

            </div>

            <div class="col-md-2">

                <label>Total</label>

                <input type="number"
                       name="total[]"
                       class="form-control total"
                       value="{{ row[6] }}"
                       readonly>

            </div>

            <div class="col-md-2">

                <label>&nbsp;</label>

                <button type="button"
                        class="btn btn-danger form-control remove-row">
                    Remove
                </button>

            </div>

        </div>

        {% endfor %}

    </div>

    <hr>

    <div class="row">

        <div class="col-md-4">

            <label>Paid Amount</label>

            <input type="number"
                   id="paid"
                   name="paid"
                   class="form-control"
                   value="{{ rows[0][7] }}">

        </div>

        <div class="col-md-4">

            <label>Balance Amount</label>

            <input type="number"
                   id="balance"
                   name="balance"
                   class="form-control"
                   value="{{ rows[0][8] }}"
                   readonly>

        </div>

    </div>

    <br>

    <button type="submit"
            class="btn btn-primary">
        Update Entry
    </button>

    <a href="/entry"
       class="btn btn-secondary">
        Cancel
    </a>

</form>
```

</div>

<script>

function calculateRow(row) {

    let liter =
        parseFloat(row.querySelector(".liter").value) || 0;

    let rate =
        parseFloat(row.querySelector(".rate").value) || 0;

    let total = liter * rate;

    row.querySelector(".total").value = total;

    calculateBalance();
}

function calculateBalance() {

    let grandTotal = 0;

    document.querySelectorAll(".total")
        .forEach(function(item){

            grandTotal +=
                parseFloat(item.value) || 0;

        });

    let paid =
        parseFloat(
            document.getElementById("paid").value
        ) || 0;

    document.getElementById("balance").value =
        grandTotal - paid;
}

document.querySelectorAll(".product-row")
    .forEach(function(row){

        let product = row.querySelector(".product");
        let rate = row.querySelector(".rate");
        let liter = row.querySelector(".liter");

        product.addEventListener("change", function(){

            let selected =
                product.options[product.selectedIndex];

            rate.value =
                selected.getAttribute("data-rate") || 0;

            calculateRow(row);

        });

        rate.addEventListener("input", function(){

            calculateRow(row);

        });

        liter.addEventListener("input", function(){

            calculateRow(row);

        });

    });
document.getElementById("paid")
    .addEventListener(
        "input",
        calculateBalance
    );

window.onload = function () {

    calculateBalance();

};

</script>

{% endblock %}
