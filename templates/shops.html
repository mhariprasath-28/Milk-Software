{% extends "layout.html" %}

{% block content %}

<h2>Shop Master</h2>

<div class="card p-3">

```
<form method="POST">

    <label>Shop Name</label>

    <input type="text"
           name="shop_name"
           class="form-control"
           required>
           

    <br>

    <button type="submit" class="btn btn-success">
        Save Shop
    </button>

</form>

<hr>

<h4>Saved Shops</h4>

<table class="table table-bordered">

    <tr>
        <th>S.No</th>
        <th>Shop Name</th>
        <th>Action</th>
    </tr>

    {% for shop in shops %}
<tr>
    <td>{{ loop.index }}</td>
    <td>{{ shop[1] }}</td>

    <td>
        <a href="/edit-shop/{{ shop[0] }}"
           class="btn btn-warning btn-sm">
           Edit
        </a>

        <a href="/delete-shop/{{ shop[0] }}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Are you sure you want to delete this shop?')">
   Delete
</a>
    </td>
</tr>
{% endfor %}
</table>
```

</div>

{% endblock %}
